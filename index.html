<!DOCTYPE html>
<html lang="ko">
<head>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&display=swap" rel="stylesheet">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KOR Alliance</title>

<style>
body {
    margin: 0;
    background: linear-gradient(180deg, #0f172a, #020617);
    color: white;
    font-family: Arial, sans-serif;
    text-align: center;
}

h1 {
    font-family: 'Orbitron', sans-serif;
    margin-top: 50px;
    font-size: 34px;
    text-shadow: 0 0 10px #3b82f6;
}

.subtitle {
    color: #94a3b8;
}

/* 탭 메뉴 */
.tabs {
    display: flex;
    margin: 30px 10px;
    border-radius: 15px;
    overflow: hidden;
}

.tab-btn {
    flex: 1;
    padding: 15px;
    font-family: 'Orbitron';
    background: #1e293b;
    border: none;
    color: white;
    font-size: 16px;
    cursor: pointer;
    transition: 0.2s;
}

.tab-btn.active {
    background: #2563eb;
    box-shadow: 0 0 10px #3b82f6;
}

/* 내용 영역 */
.tab-content {
    display: none;
    padding: 20px;
    margin: 10px;
    border-radius: 20px;
    background: linear-gradient(145deg, #1e293b, #020617);
    text-align: left;
    animation: fadeIn 0.3s;
}

.tab-content.active {
    display: block;
}

/* 카드 스타일 */
.card-title {
    text-align: center;
    font-family: 'Orbitron';
    margin-bottom: 15px;
    color: #60a5fa;
}

.card-sub {
    font-weight: bold;
    color: #3b82f6;
}

@keyframes fadeIn {
    from {opacity: 0; transform: translateY(10px);}
    to {opacity: 1; transform: translateY(0);}
}

/* 하단 버튼 */
.btn {
    display: block;
    margin: 15px;
    padding: 20px;
    border-radius: 15px;
    background: #1e293b;
    color: white;
    text-decoration: none;
    font-family: 'Orbitron';
}

.main-btn {
    background: #2563eb;
}

.footer {
    margin-top: 40px;
    font-size: 12px;
    color: #64748b;
}
</style>

</head>
<body>

<h1>2593 KOR ALLIANCE</h1>
<div class="subtitle">White Out Survival</div>

<!-- 탭 버튼 -->
<div class="tabs">
    <button class="tab-btn active" onclick="openTab('kor')">🛡 KOR</button>
    <button class="tab-btn" onclick="openTab('tem')">🔥 TEM</button>
</div>

<!-- KOR -->
<div id="kor" class="tab-content active">
    <div class="card-title">🛡 KOR ALLIANCE</div>

    <div class="card-sub">🐻 곰 사냥</div>
    곰1 : UTC 12:00<br>
    곰2 : UTC 13:20<br><br>

    <div class="card-sub">📌 규칙</div>
    - 집결 참여 필수<br>
    - 부대 설정 준수<br>
    - 잘못된 영웅 사용 시 kick
</div>

<!-- TEM -->
<div id="tem" class="tab-content">
    <div class="card-title">🔥 TEM ALLIANCE</div>

    <div class="card-sub">🐻 곰 사냥</div>
    곰1 : UTC 11:30<br>
    곰2 : UTC 13:00<br><br>

    <div class="card-sub">📌 규칙</div>
    - 자유 참여 가능<br>
    - 집결 우선 참여 권장<br>
    - 협동 플레이 중요
</div>

<!-- 하단 버튼 -->
<a class="btn main-btn" href="#">🔥 JOIN KOR</a>
<a class="btn" href="https://open.kakao.com/o/sbU2bgbi">💬 문의하기</a>
<a class="btn" href="#">📋 가입 신청</a>

<div class="footer">© KOR Alliance</div>

<script>
function openTab(tabName) {
    var i;
    var content = document.getElementsByClassName("tab-content");
    var buttons = document.getElementsByClassName("tab-btn");

    for (i = 0; i < content.length; i++) {
        content[i].classList.remove("active");
    }

    for (i = 0; i < buttons.length; i++) {
        buttons[i].classList.remove("active");
    }

    document.getElementById(tabName).classList.add("active");
    event.target.classList.add("active");
}
</script>

</body>
</html>
