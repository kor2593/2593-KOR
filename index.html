<!DOCTYPE html>
<html lang="ko">
<head>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&display=swap" rel="stylesheet">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KOR Alliance</title>

<style>
body {
    margin: 0;
    background: linear-gradient(180deg, #0f172a, #020617);
    color: white;
    font-family: Arial, sans-serif;
    text-align: center;
}

/* 제목 */
h1 {
    font-family: 'Orbitron', sans-serif;
    margin-top: 60px;
    font-size: 36px;
    font-weight: 800;
    letter-spacing: 2px;
    text-shadow: 0 0 10px #3b82f6;
}

/* 설명 */
.subtitle {
    margin-top: 10px;
    font-size: 16px;
    color: #94a3b8;
}

/* 버튼 영역 */
.container {
    margin-top: 40px;
    padding: 0 20px;
}

/* 버튼 스타일 */
.btn {
    font-family: 'Orbitron', sans-serif;
    display: block;
    width: 100%;
    margin: 15px 0;
    padding: 22px;
    border-radius: 18px;
    background: #1e293b;
    color: white;
    text-decoration: none;
    font-size: 20px;
    font-weight: bold;
    box-shadow: 0 6px 20px rgba(0,0,0,0.4);
    border: 1px solid rgba(255,255,255,0.1);
    transition: 0.2s;
}

.btn:active {
    transform: scale(0.97);
}

.main-btn {
    background: #2563eb;
}

/* 카드 */
.card {
    display: none;
    margin-top: 20px;
    padding: 20px;
    border-radius: 20px;
    background: linear-gradient(145deg, #1e293b, #020617);
    box-shadow: 0 10px 30px rgba(0,0,0,0.6);
    border: 1px solid rgba(59,130,246,0.4);
    text-align: left;
    animation: fadeIn 0.3s ease;
}

.card-title {
    font-family: 'Orbitron', sans-serif;
    font-size: 20px;
    margin-bottom: 15px;
    text-align: center;
    color: #60a5fa;
    text-shadow: 0 0 10px #3b82f6;
}

.card-section {
    margin-bottom: 15px;
    font-size: 16px;
}

.card-sub {
    font-weight: bold;
    margin-bottom: 5px;
    color: #3b82f6;
}

@keyframes fadeIn {
    from {opacity: 0; transform: translateY(20px);}
    to {opacity: 1; transform: translateY(0);}
}

.footer {
    margin-top: 50px;
    font-size: 12px;
    color: #64748b;
}
</style>

</head>
<body>

<h1>
2593 KOR ALLIANCE<br>
WELCOME
</h1>

<div class="subtitle">
White Out Survival
</div>

<div class="container">

<a class="btn main-btn" href="#">🔥 JOIN KOR</a>

<a class="btn" onclick="toggleKOR()">🛡 KOR 연맹</a>

<a class="btn" href="https://open.kakao.com/o/sbU2bgbi">💬 문의하기</a>

<a class="btn" href="#">📋 가입 신청</a>

<a class="btn" href="#">⚔ 전략 가이드</a>

<!-- 카드 UI -->
<div id="korCard" class="card">

  <div class="card-title">🛡 KOR ALLIANCE</div>

  <div class="card-section">
    <div class="card-sub">🐻 곰 사냥</div>
    곰1 : UTC 12:00<br>
    곰2 : UTC 13:20
  </div>

  <div class="card-section">
    <div class="card-sub">📌 규칙</div>
    - 집결 참여 필수<br>
    - 부대 설정 준수<br>
    - 잘못된 영웅 사용 시 kick
  </div>

</div>

</div>

<div class="footer">
© KOR Alliance Minions
</div>

<script>
function toggleKOR() {
  var card = document.getElementById("korCard");
  if (card.style.display === "none" || card.style.display === "") {
    card.style.display = "block";
  } else {
    card.style.display = "none";
  }
}
</script>

</body>
</html>
