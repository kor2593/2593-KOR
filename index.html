<!DOCTYPE html>
<html lang="ko">
<head>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&display=swap" rel="stylesheet">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KOR Alliance</title>

<style>
body {
    margin: 0;
    background: #020617;
    color: white;
    font-family: Arial, sans-serif;
    text-align: center;
    overflow-x: hidden;
}

/* 🎬 인트로 */
#intro {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: black;
    z-index: 9999;
    transition: opacity 1s ease;
}

#intro video {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.skip {
    position: absolute;
    bottom: 40px;
    right: 20px;
    font-family: 'Orbitron';
    font-size: 14px;
    border: 1px solid white;
    padding: 8px 15px;
    opacity: 0.7;
}

/* 🌌 배경 */
.bg-animation {
    position: fixed;
    width: 200%;
    height: 200%;
    background: radial-gradient(circle, rgba(59,130,246,0.15) 1px, transparent 1px);
    background-size: 40px 40px;
    animation: moveBg 20s linear infinite;
    z-index: -2;
}

/* ❄ 눈 */
.snow {
    position: fixed;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: -1;
    background-image:
        radial-gradient(white 1px, transparent 1px),
        radial-gradient(white 1px, transparent 1px),
        radial-gradient(white 2px, transparent 2px);
    background-size: 50px 50px, 100px 100px, 150px 150px;
    animation: snowFall 15s linear infinite;
}

@keyframes moveBg {
    from { transform: translate(0,0); }
    to { transform: translate(-200px,-200px); }
}

@keyframes snowFall {
    from { background-position: 0 0, 0 0, 0 0; }
    to { background-position: 0 500px, 0 300px, 0 700px; }
}

/* 제목 */
h1 {
    font-family: 'Orbitron';
    margin-top: 50px;
    font-size: 34px;
    text-shadow: 0 0 10px #3b82f6;
}

.subtitle {
    color: #94a3b8;
}

/* 탭 */
.tabs {
    display: flex;
    margin: 30px 10px;
    border-radius: 15px;
    overflow: hidden;
}

.tab-btn {
    flex: 1;
    padding: 15px;
    font-family: 'Orbitron';
    background: #1e293b;
    border: none;
    color: white;
}

.tab-btn.active {
    background: #2563eb;
    box-shadow: 0 0 10px #3b82f6;
}

/* 콘텐츠 */
.tab-content {
    display: none;
    padding: 20px;
    margin: 10px;
    border-radius: 20px;
    background: linear-gradient(145deg, #1e293b, #020617);
    text-align: left;
    animation: fadeIn 0.3s;
}

.tab-content.active {
    display: block;
}

.card-title {
    text-align: center;
    font-family: 'Orbitron';
    margin-bottom: 15px;
    color: #60a5fa;
}

.card-sub {
    font-weight: bold;
    color: #3b82f6;
}

@keyframes fadeIn {
    from {opacity: 0;}
    to {opacity: 1;}
}

/* 버튼 */
.btn {
    display: block;
    margin: 15px;
    padding: 20px;
    border-radius: 15px;
    background: #1e293b;
    color: white;
    text-decoration: none;
    font-family: 'Orbitron';
    position: relative;
    overflow: hidden;
}

.btn:active {
    transform: scale(0.96);
}

.btn::before {
    content: "";
    position: absolute;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(120deg, transparent, rgba(255,255,255,0.3), transparent);
    transition: 0.5s;
}

.btn:hover::before {
    left: 100%;
}

.main-btn {
    background: #2563eb;
    box-shadow: 0 0 15px #3b82f6;
}

.footer {
    margin-top: 40px;
    font-size: 12px;
    color: #64748b;
}
</style>
</head>

<body>

<!-- 🎬 인트로 -->
<div id="intro">
  <video id="introVideo" autoplay muted playsinline>
    <source src="intro.mp4" type="video/mp4">
  </video>
  <div class="skip" onclick="skipIntro()">SKIP</div>
</div>

<!-- 배경 -->
<div class="bg-animation"></div>
<div class="snow"></div>

<h1>2593 KOR ALLIANCE</h1>
<div class="subtitle">White Out Survival</div>

<!-- 탭 -->
<div class="tabs">
    <button class="tab-btn active" onclick="openTab('kor', this)">🛡 KOR</button>
    <button class="tab-btn" onclick="openTab('tem', this)">🔥 TEM</button>
</div>

<!-- KOR -->
<div id="kor" class="tab-content active">
    <div class="card-title">🛡 KOR ALLIANCE</div>
    <div class="card-sub">🐻 곰 사냥</div>
    곰1 : UTC 12:00<br>
    곰2 : UTC 13:20<br><br>

    <div class="card-sub">📌 규칙</div>
    - 집결 참여 필수<br>
    - 부대 설정 준수<br>
    - 잘못된 영웅 사용 시 kick
</div>

<!-- TEM -->
<div id="tem" class="tab-content">
    <div class="card-title">🔥 TEM ALLIANCE</div>
    <div class="card-sub">🐻 곰 사냥</div>
    곰1 : UTC 11:30<br>
    곰2 : UTC 13:00<br><br>

    <div class="card-sub">📌 규칙</div>
    - 자유 참여 가능<br>
    - 집결 우선 참여 권장<br>
    - 협동 플레이 중요
</div>

<a class="btn main-btn" href="#">🔥 JOIN KOR</a>
<a class="btn" href="https://open.kakao.com/o/sbU2bgbi">💬 문의하기</a>
<a class="btn" href="#">📋 가입 신청</a>

<div class="footer">© KOR Alliance</div>

<script>
function openTab(tabName, el) {
    let content = document.getElementsByClassName("tab-content");
    let buttons = document.getElementsByClassName("tab-btn");

    for (let i=0;i<content.length;i++){
        content[i].classList.remove("active");
    }

    for (let i=0;i<buttons.length;i++){
        buttons[i].classList.remove("active");
    }

    document.getElementById(tabName).classList.add("active");
    el.classList.add("active");
}

/* 🎬 인트로 페이드 */
window.onload = function(){
    let intro = document.getElementById("intro");
    let video = document.getElementById("introVideo");

    video.onended = fadeOutIntro;
};

function skipIntro(){
    fadeOutIntro();
}

function fadeOutIntro(){
    let intro = document.getElementById("intro");
    intro.style.opacity = "0";
    setTimeout(()=>{
        intro.style.display = "none";
    },1000);
}
</script>

</body>
</html>
