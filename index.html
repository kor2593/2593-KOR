<!DOCTYPE html>
<html lang="ko">
<head>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&display=swap" rel="stylesheet">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WELCOME TO 2593</title>

<style>
body {
    margin: 0;
    background: #020617;
    color: white;
    font-family: Arial, sans-serif;
    text-align: center;
    overflow-x: hidden;
}

/* 배경 */
.bg-animation {
    position: fixed;
    width: 200%;
    height: 200%;
    background: radial-gradient(circle, rgba(59,130,246,0.15) 1px, transparent 1px);
    background-size: 40px 40px;
    animation: moveBg 20s linear infinite;
    z-index: -2;
}

.snow {
    position: fixed;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: -1;
    background-image:
        radial-gradient(white 1px, transparent 1px),
        radial-gradient(white 1px, transparent 1px),
        radial-gradient(white 2px, transparent 2px);
    background-size: 50px 50px, 100px 100px, 150px 150px;
    animation: snowFall 15s linear infinite;
}

@keyframes moveBg {
    to { transform: translate(-200px,-200px); }
}

@keyframes snowFall {
    to { background-position: 0 500px, 0 300px, 0 700px; }
}

/* 제목 애니메이션 */
h1 {
    font-family: 'Orbitron';
    margin-top: 50px;
    font-size: 34px;
    text-shadow: 0 0 10px #3b82f6;
    animation: fadeUp 1s ease;
}

.subtitle {
    color: #94a3b8;
    animation: fadeUp 1.5s ease;
}

@keyframes fadeUp {
    from {opacity:0; transform: translateY(20px);}
    to {opacity:1; transform: translateY(0);}
}

/* 탭 */
.tabs {
    display: flex;
    margin: 30px 10px;
}

.tab-btn {
    flex: 1;
    padding: 15px;
    font-family: 'Orbitron';
    background: #1e293b;
    border: none;
    color: white;
    transition: 0.2s;
}

.tab-btn.active {
    background: #2563eb;
    box-shadow: 0 0 10px #3b82f6;
}

/* 콘텐츠 애니메이션 */
.tab-content {
    display: none;
    padding: 20px;
    margin: 10px;
    border-radius: 20px;
    background: linear-gradient(145deg, #1e293b, #020617);
    text-align: left;
    animation: fadeUp 0.5s ease;
}

.tab-content.active {
    display: block;
}

/* 카드 */
.card-title {
    text-align: center;
    font-family: 'Orbitron';
    color: #60a5fa;
}

.card-sub {
    font-weight: bold;
    color: #3b82f6;
}

/* 버튼 애니메이션 */
.btn {
    display: block;
    margin: 15px;
    padding: 20px;
    border-radius: 15px;
    background: #1e293b;
    color: white;
    text-decoration: none;
    font-family: 'Orbitron';
    position: relative;
    overflow: hidden;
    transition: 0.2s;
}

.btn:active {
    transform: scale(0.95);
}

.btn::before {
    content: "";
    position: absolute;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(120deg, transparent, rgba(255,255,255,0.3), transparent);
    transition: 0.6s;
}

.btn:hover::before {
    left: 100%;
}

.main-btn {
    background: #2563eb;
    box-shadow: 0 0 15px #3b82f6;
}

.chat {
    background: rgba(255,255,255,0.05);
    padding: 8px;
    border-radius: 10px;
    margin: 5px 0;
}

.footer {
    margin-top: 40px;
    font-size: 12px;
    color: #64748b;
}
</style>
</head>

<body>

<div class="bg-animation"></div>
<div class="snow"></div>

<h1>
WELCOME TO<br>
2593
</h1>
<div class="subtitle">White Out Survival</div>

<div class="tabs">
    <button class="tab-btn active" onclick="openTab('kor', this)">🛡 KOR</button>
    <button class="tab-btn" onclick="openTab('tem', this)">🔥 TEM</button>
    <button class="tab-btn" onclick="openTab('infoCard', this)">📖 INFO</button>
</div>

<div id="kor" class="tab-content active">
    <div class="card-title">🛡 KOR ALLIANCE</div>

    <div class="card-sub">⚔️ 곰 사냥</div>
    1차 : KOR 21:00<br>
    2차 : KOR 22:20<br><br>
</div>

<div id="tem" class="tab-content">
    <div class="card-title">🔥 TEM ALLIANCE</div>

    <div class="chat">🧑 라짱 : 참여율 높아서 좋음</div>
    <div class="chat">🧑 덕덕 : 부담 없음</div>
</div>

<div id="infoCard" class="tab-content">
    <div class="card-title">📖 SERVER INFO</div>
    ONE TEAM / SVS 중심 서버
</div>

<a class="btn main-btn" onclick="openTab('infoCard', this)">📖 서버 설명</a>
<a class="btn">💬 문의하기</a>

<div class="footer">© KOR Alliance</div>

<script>
function openTab(tabName, el) {
    let content = document.getElementsByClassName("tab-content");
    let buttons = document.getElementsByClassName("tab-btn");

    for (let i=0;i<content.length;i++){
        content[i].classList.remove("active");
    }

    for (let i=0;i<buttons.length;i++){
        buttons[i].classList.remove("active");
    }

    document.getElementById(tabName).classList.add("active");

    if(el){
        el.classList.add("active");
    }
}
</script>

</body>
</html>
