<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KOR Alliance</title>

<style>
body {
    margin: 0;
    background: linear-gradient(180deg, #0f172a, #020617);
    color: white;
    font-family: Arial, sans-serif;
    text-align: center;
}

/* 제목 */
h1 {
    margin-top: 60px;
    font-size: 36px;
    font-weight: 900;
    line-height: 1.4;
}

/* 설명 */
.subtitle {
    margin-top: 10px;
    font-size: 16px;
    color: #94a3b8;
}

/* 버튼 영역 */
.container {
    margin-top: 40px;
    padding: 0 20px;
}

/* 버튼 스타일 */
.btn {
    display: block;
    width: 100%;
    margin: 15px 0;
    padding: 22px;
    border-radius: 18px;
    background: #1e293b;
    color: white;
    text-decoration: none;
    font-size: 20px;
    font-weight: bold;
    box-shadow: 0 6px 20px rgba(0,0,0,0.4);
    transition: 0.2s;
}

/* 클릭 효과 */
.btn:active {
    transform: scale(0.97);
}

/* 강조 버튼 */
.main-btn {
    background: #2563eb;
}

/* 하단 */
.footer {
    margin-top: 50px;
    font-size: 12px;
    color: #64748b;
}
</style>

</head>
<body>

<h1>
KOR ALLIANCE<br>
WELCOME
</h1>

<div class="subtitle">
White Out Survival Server
</div>

<div class="container">

<a class="btn main-btn" href="#">🔥 JOIN KOR</a>

<a class="btn" href="https://open.kakao.com/o/sbU2bgbi">💬 문의하기</a>

<a class="btn" href="#">📋 가입 신청</a>

<a class="btn" href="#">📜 연맹 규칙</a>

<a class="btn" href="#">⚔ 전략 가이드</a>

</div>

<div class="footer">
© KOR Alliance
</div>

</body>
</html>
